<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Yo Mei Yuan</title>

<link href="https://fonts.googleapis.com/css2?family=Aladin&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>

<style>

body{
font-family:'Aladin', cursive;
background-image:url("https://i.pinimg.com/736x/cf/7d/a7/cf7da71ccbf727c78542876cadc13a4e.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
text-align:center;
padding:40px;
margin:0;
}

/* PANEL */

.container{
position:relative;
overflow:hidden;

max-width:750px;
margin:400px auto 0 auto;
padding:35px;
border-radius:18px;

background:rgba(0,0,0,0.30);
backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.25);

display:flex;
flex-direction:column;
align-items:center;

box-shadow:
0 0 15px rgba(59,130,246,0.6),
0 10px 30px rgba(0,0,0,0.6),
inset 0 0 10px rgba(255,255,255,0.1);
}

/* SPARKLE */

.sparkle-area{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.sparkle{
position:absolute;
color:white;
font-size:18px;

text-shadow:
0 0 5px #fff,
0 0 10px #a5b4fc,
0 0 20px #818cf8,
0 0 30px #6366f1;

animation:twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{

0%{opacity:0.2;transform:scale(0.6);}
50%{opacity:1;transform:scale(1.3);}
100%{opacity:0.3;transform:scale(0.7);}

}

/* ===== GRAFFITI TITLE ===== */

.title-box{
position:relative;
width:420px;
margin-bottom:20px;
}

.title-box img{
width:100%;
}

.title-text{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:48px;
color:white;

-webkit-text-stroke:4px #ff2d8f;

text-shadow:
3px 3px 0 #000,
0 0 10px rgba(255,255,255,0.6);

letter-spacing:3px;

}

/* AYAT */

.verse{
margin-bottom:20px;
font-size:15px;
color:white;
}

/* TEXTAREA */

textarea{

width:65%;
height:150px;

font-size:16px;
padding:12px;

border-radius:10px;
border:none;

resize:none;

background:rgba(255,255,255,0.35);
backdrop-filter:blur(5px);

color:black;
font-family:'Courier New', monospace;

box-shadow:0 0 10px rgba(59,130,246,0.3);

}

/* UPLOAD AREA */

.upload-box{

margin-top:20px;

display:flex;
flex-direction:column;
align-items:center;

gap:10px;

}

/* COPY BUTTON */

.copy-btn{

padding:10px 18px;

cursor:pointer;

border:none;
border-radius:10px;

background:#3b82f6;

color:white;

font-size:20px;

box-shadow:0 0 10px rgba(59,130,246,0.6);

}

.copy-btn:hover{

background:#2563eb;
box-shadow:0 0 18px rgba(59,130,246,0.9);

}

/* FOOTER */

.footer-name{

margin-top:30px;
font-size:18px;
font-weight:bold;
letter-spacing:1px;
color:white;

}

</style>
</head>

<body>

<div class="container">

<div class="sparkle-area" id="sparkleArea"></div>

<!-- GRAFFITI TITLE -->

<div class="title-box">

<img src="https://i.imgur.com/3sK2UeC.png">

<div class="title-text">
YO MEI YUAN
</div>

</div>

<div class="verse">

Percayalah kepada TUHAN dengan segenap hatimu, dan jangan bersandar kepada pengertianmu sendiri.  
Akuilah Dia dalam segala lakumu, maka Ia akan meluruskan jalanmu.  
<b>Amsal 3:5-6</b>

</div>

<textarea id="result" placeholder="Sini Guyssss hehehe"></textarea>

<div class="upload-box">

<input type="file" id="imageInput">

<button class="copy-btn" onclick="copyText()">📋</button>

</div>

</div>

<div class="footer-name">YMY</div>

<script>

/* SPARKLE */

const sparkleArea=document.getElementById("sparkleArea");

for(let i=0;i<35;i++){

let star=document.createElement("div");

star.className="sparkle";
star.innerHTML="✦";

star.style.top=Math.random()*100+"%";
star.style.left=Math.random()*100+"%";

star.style.animationDelay=Math.random()*3+"s";

sparkleArea.appendChild(star);

}

/* OCR */

function runOCR(image){

Tesseract.recognize(
image,
'eng'
).then(({data:{text}})=>{

let cleaned=text
.replace(/\n+/g,"")
.replace(/\s+/g,"")
.trim();

document.getElementById("result").value=cleaned;

})

}

/* UPLOAD */

document.getElementById('imageInput').addEventListener('change',function(){

const file=this.files[0];
runOCR(file);

})

/* PASTE SCREENSHOT */

document.addEventListener('paste',function(event){

const items=event.clipboardData.items;

for(let i=0;i<items.length;i++){

if(items[i].type.indexOf("image")!==-1){

const blob=items[i].getAsFile();
runOCR(blob);

}

}

})

/* COPY */

function copyText(){

const textarea=document.getElementById("result");

textarea.select();
document.execCommand("copy");

}

</script>

</body>
</html>
