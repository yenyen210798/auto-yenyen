<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KITA KITA SAJA</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>

<style>
body{
  font-family:BREE SERIF;
  background-image:url("https://i.pinimg.com/736x/cf/7d/a7/cf7da71ccbf727c78542876cadc13a4e.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:white;
  text-align:center;
  padding:40px;
  margin:0;
}

/* ===== PANEL UTAMA GLASS ===== */
.container{
  max-width:750px;
  margin:400px auto 0 auto; /* turunkan seluruh panel ke bawah */
  padding:35px;
  border-radius:15px;
  background: rgba(0,0,0,0.25); /* semi-transparent glass */
  backdrop-filter:blur(10px);
  display:flex;
  flex-direction:column;
  align-items:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h1{
  margin-bottom:10px;
  letter-spacing:2px;
}

.verse{
  margin-bottom:20px;
  font-size:15px;
  opacity:0.9;
}

/* ===== TEXTAREA (KOTAK PUTIH) ===== */
textarea{
  width:60%;
  height:150px;
  margin-top:20px;
  font-size:16px;
  padding:10px;
  border-radius:8px;
  border:none;
  resize:none;
  color:#111;
  background:rgba(255,255,255,0.3);
}

button{
  padding:10px 25px;
  margin-top:15px;
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  margin:3px;
}

button:hover{
  background:#2563eb;
}

/* ===== TEKS NAMA BAWAH ===== */
.footer-name{
  margin-top:30px;
  font-size:18px;
  font-weight:bold;
  letter-spacing:1px;
  opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<h1>KITA KITA SAJA</h1>

<div class="verse">
Percayalah kepada TUHAN dengan segenap hatimu, dan jangan bersandar kepada pengertianmu sendiri. Akuilah Dia dalam segala lakumu, maka Ia akan meluruskan jalanmu.  
<b>Amsal 3:5-6</b>
</div>

<input type="file" id="imageInput">
<br>
<button onclick="copyText()">Copy Text</button>

<textarea id="result" placeholder="Hasil teks muncul di sini..."></textarea>

</div>

<!-- ===== NAMA BAWAH ===== -->
<div class="footer-name">YO MEI YUAN</div>

<script>
/* ===== OCR FUNCTION ===== */
function runOCR(image){
  Tesseract.recognize(
    image,
    'eng'
  ).then(({ data: { text } }) => {
    let cleaned = text.replace(/\n+/g,"").replace(/\s+/g,"").trim();
    document.getElementById("result").value = cleaned;
  })
}

/* ===== UPLOAD GAMBAR ===== */
document.getElementById('imageInput').addEventListener('change',function(){
  const file = this.files[0];
  runOCR(file);
})

/* ===== PASTE SCREENSHOT ===== */
document.addEventListener('paste',function(event){
  const items = event.clipboardData.items;
  for (let i = 0; i < items.length; i++) {
    if (items[i].type.indexOf("image") !== -1) {
      const blob = items[i].getAsFile();
      runOCR(blob);
    }
  }
})

/* ===== COPY TEXT ===== */
function copyText(){
  const textarea = document.getElementById("result");
  textarea.select();
  document.execCommand("copy");
}
</script>

</body>
</html>
